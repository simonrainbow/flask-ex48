<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Page</title>
</head>
<body>
    <h1>Template - Page </h1>
    <h2>{{text}}</h2>
    {% if x != undefined %}
    <h2>User Info: </h2>
    <p>name: {{x.name}}</p>
    <p>age: {{x.age}}</p>
    <p>city: {{x.city}}</p>
    {% endif %}
</body>
</html>
